<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress in work</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #020c14;
      --bg-2: #0f2940;
      --bg-3: #20598a;
      --panel: rgba(3, 13, 23, 0.56);
      --line: rgba(32, 89, 138, 0.28);
      --text: #edf6ff;
      --accent: #20598a;
      --accent-bright: #6daee6;
      --glow-x: 50%;
      --glow-y: 50%;
      --glow-size: 24rem;
      --tilt-x: 0deg;
      --tilt-y: 0deg;
      --shift-x: 0px;
      --shift-y: 0px;
      --drag-x: 0px;
      --drag-y: 0px;
      --scroll-shift: 0px;
      --space-warp: 0;
      --flash: 0;
      --phase-rotate: -8deg;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      background:
        radial-gradient(circle at var(--glow-x) var(--glow-y), rgba(32, 89, 138, 0.34), transparent var(--glow-size)),
        radial-gradient(circle at 14% 18%, rgba(32, 89, 138, 0.18), transparent 20rem),
        linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 52%, var(--bg-3) 100%);
      color: var(--text);
      font-family: "Pixelify Sans", "Segoe UI", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      cursor: grab;
    }

    body.dragging {
      cursor: grabbing;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -12vmax;
      pointer-events: none;
    }

    body::before {
      background:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 4rem 4rem;
      opacity: 0.52;
      transform:
        rotate(var(--phase-rotate))
        translate3d(calc(var(--shift-x) * -0.12 + var(--drag-x) * -0.08), calc(var(--shift-y) * -0.12 + var(--scroll-shift) * -0.2), 0)
        scale(calc(1 + var(--space-warp) * 0.035));
      transition: transform 220ms ease-out, opacity 220ms ease-out;
    }

    body::after {
      background:
        conic-gradient(from calc(170deg + var(--phase-rotate)) at 50% 50%, transparent 0deg, rgba(109, 174, 230, 0.16) 70deg, transparent 180deg, rgba(109, 174, 230, 0.1) 305deg, transparent 360deg);
      filter: blur(5rem);
      opacity: calc(0.42 + var(--flash) * 0.18 + var(--space-warp) * 0.08);
      transition: opacity 180ms ease-out;
    }

    .field {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.9;
      z-index: 0;
    }

    .frame,
    .headline {
      user-select: none;
    }

    .interaction-layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 4;
    }

    main {
      position: relative;
      z-index: 2;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: clamp(1rem, 3vw, 2rem);
    }

    .frame {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      display: grid;
      place-items: center;
      width: min(94vw, 70rem);
      min-height: min(76vh, 44rem);
      padding: clamp(2rem, 6vw, 5rem);
      border: 1px solid var(--line);
      border-radius: 2rem;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03)),
        var(--panel);
      backdrop-filter: blur(24px);
      box-shadow:
        0 2.8rem 5rem rgba(0, 0, 0, 0.34),
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 0 0 1px rgba(32, 89, 138, 0.1);
      transform:
        perspective(1400px)
        rotateX(var(--tilt-x))
        rotateY(var(--tilt-y))
        translate3d(calc(var(--shift-x) * 0.05 + var(--drag-x) * 0.12), calc(var(--shift-y) * 0.05 + var(--drag-y) * 0.08 + var(--scroll-shift) * 0.08), 0)
        scale(calc(1 + var(--flash) * 0.012 + var(--space-warp) * 0.012));
      transition: transform 180ms ease-out, border-color 180ms ease-out, box-shadow 180ms ease-out;
    }

    .frame::before,
    .frame::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .frame::before {
      inset: 1rem;
      border: 1px solid rgba(32, 89, 138, 0.12);
      border-radius: 1.4rem;
    }

    .frame::after {
      inset: -30%;
      background: linear-gradient(115deg, transparent 28%, rgba(237, 246, 255, 0.09) 48%, transparent 66%);
      opacity: calc(var(--flash) * 0.82);
      transform: translate3d(calc(var(--shift-x) * 0.12), calc(var(--shift-y) * 0.12), 0);
      transition: opacity 180ms ease-out, transform 180ms ease-out;
    }

    .headline {
      position: relative;
      z-index: 2;
      margin: 0;
      max-width: 9ch;
      font-size: clamp(3.6rem, 12vw, 9rem);
      line-height: 0.86;
      text-align: center;
      text-transform: lowercase;
      font-weight: 700;
      letter-spacing: calc(0.02em + var(--flash) * 0.016em);
      text-wrap: balance;
      filter: drop-shadow(0 0 2rem rgba(32, 89, 138, 0.24));
      transform:
        translate3d(calc(var(--shift-x) * 0.06 + var(--drag-x) * 0.04), calc(var(--shift-y) * 0.06 + var(--scroll-shift) * 0.04), 0)
        scale(calc(1 + var(--space-warp) * 0.015))
        scaleX(calc(1 + var(--flash) * 0.018 + var(--space-warp) * 0.02));
      transition: transform 180ms ease-out, letter-spacing 180ms ease-out, filter 180ms ease-out;
    }

    .headline[data-state="scrambling"] {
      letter-spacing: 0.08em;
    }

    .headline::before,
    .headline::after {
      content: "";
      position: absolute;
      left: 50%;
      width: min(60vw, 34rem);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(109, 174, 230, 0.55), transparent);
      transform: translateX(-50%);
      opacity: calc(0.38 + var(--flash) * 0.16);
      pointer-events: none;
    }

    .headline::before {
      top: -1.4rem;
    }

    .headline::after {
      bottom: -1.4rem;
    }

    .cursor-ring {
      position: fixed;
      top: 0;
      left: 0;
      width: 1.1rem;
      height: 1.1rem;
      margin: -0.55rem 0 0 -0.55rem;
      border: 1px solid rgba(109, 174, 230, 0.68);
      border-radius: 50%;
      pointer-events: none;
      mix-blend-mode: screen;
      transform: translate3d(var(--glow-x), var(--glow-y), 0);
      transition: width 140ms ease, height 140ms ease, border-color 140ms ease;
      z-index: 5;
    }

    .ripple {
      position: fixed;
      width: 1rem;
      height: 1rem;
      margin: -0.5rem 0 0 -0.5rem;
      border: 1px solid rgba(109, 174, 230, 0.92);
      border-radius: 50%;
      opacity: 0;
      animation: ripple 760ms ease-out forwards;
    }

    .glyph {
      position: fixed;
      left: 0;
      top: 0;
      font-size: clamp(0.95rem, 1.8vw, 1.35rem);
      font-weight: 700;
      line-height: 1;
      color: rgba(237, 246, 255, 0.98);
      text-shadow: 0 0 0.8rem rgba(109, 174, 230, 0.42);
      transform: translate(-50%, -50%);
      animation: glyphBurst 900ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .pixel {
      position: fixed;
      left: 0;
      top: 0;
      width: var(--size);
      height: var(--size);
      background: rgba(109, 174, 230, 0.95);
      box-shadow: 0 0 1rem rgba(109, 174, 230, 0.54);
      transform: translate(-50%, -50%);
      animation: pixelBurst 860ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .frame:hover {
      border-color: rgba(109, 174, 230, 0.54);
      box-shadow:
        0 2.8rem 5rem rgba(0, 0, 0, 0.34),
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 0 0 1px rgba(109, 174, 230, 0.2);
    }

    .frame:hover ~ .cursor-ring {
      width: 2.3rem;
      height: 2.3rem;
      border-color: rgba(109, 174, 230, 0.94);
    }

    body.dragging .cursor-ring {
      width: 2.8rem;
      height: 2.8rem;
      border-color: rgba(237, 246, 255, 0.94);
    }

    @keyframes ripple {
      0% {
        opacity: 0.82;
        transform: scale(0.7);
      }
      100% {
        opacity: 0;
        transform: scale(20);
      }
    }

    @keyframes glyphBurst {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.6) rotate(var(--rotate));
      }
      12% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.04) rotate(var(--rotate));
      }
    }

    @keyframes pixelBurst {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
      }
      12% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1);
      }
    }

    @media (max-width: 820px) {
      html,
      body {
        cursor: auto;
      }

      .frame {
        min-height: min(72vh, 34rem);
      }
      .cursor-ring {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }

      .field,
      .interaction-layer {
        display: none;
      }
    }
  </style>
</head>
<body>
  <canvas class="field" aria-hidden="true"></canvas>

  <div class="interaction-layer" aria-hidden="true"></div>

  <main>
    <section class="frame">
      <h1 class="headline">progress in work</h1>
    </section>

    <div class="cursor-ring" aria-hidden="true"></div>
  </main>

  <script>
    const root = document.documentElement;
    const body = document.body;
    const headline = document.querySelector(".headline");
    const canvas = document.querySelector(".field");
    const interactionLayer = document.querySelector(".interaction-layer");
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
    const phaseStates = [
      { rotate: -8, glow: "24rem" },
      { rotate: 0, glow: "30rem" },
      { rotate: 8, glow: "19rem" }
    ];
    const glyphPool = ["#", "+", "0", "1", "/", "*", "?", "<", ">", "=", "%", "@", ";", ":"];
    const scramblePool = "progressinwork0123456789#%+/*?<>=@";
    const headlineText = "progress in work";
    const scrambleDuration = 32;
    const ambientShuffleTickDelay = 280;
    const ambientShuffleChance = 0.03;
    const ambientShuffleMaxCharacters = 5;
    const headlineCharacters = headlineText.split("");
    const ambientShuffleIndices = headlineCharacters.reduce((indices, character, index) => {
      if (character !== " ") {
        indices.push(index);
      }

      return indices;
    }, []);
    const pointer = {
      x: window.innerWidth / 2,
      y: window.innerHeight / 2,
      targetX: window.innerWidth / 2,
      targetY: window.innerHeight / 2,
      active: false
    };
    const drag = {
      active: false,
      x: 0,
      y: 0,
      lastX: window.innerWidth / 2,
      lastY: window.innerHeight / 2,
      lastBurst: 0
    };
    const scroll = {
      shift: 0,
      velocity: 0,
      warp: 0,
      direction: 1
    };
    const particles = [];
    const ctx = canvas.getContext("2d");
    let phaseIndex = 0;
    let flash = 0;
    let scrambleFrame = 0;
    let ambientShuffleInterval = 0;

    function setScene(clientX, clientY) {
      const width = window.innerWidth || 1;
      const height = window.innerHeight || 1;
      const xRatio = clientX / width;
      const yRatio = clientY / height;
      const xOffset = (xRatio - 0.5) * 2;
      const yOffset = (yRatio - 0.5) * 2;

      root.style.setProperty("--glow-x", `${clientX}px`);
      root.style.setProperty("--glow-y", `${clientY}px`);
      root.style.setProperty("--tilt-x", `${clamp(yOffset * -8, -8, 8)}deg`);
      root.style.setProperty("--tilt-y", `${clamp(xOffset * 8, -8, 8)}deg`);
      root.style.setProperty("--shift-x", `${xOffset * 34}px`);
      root.style.setProperty("--shift-y", `${yOffset * 34}px`);
      root.style.setProperty("--drag-x", `${drag.x.toFixed(2)}px`);
      root.style.setProperty("--drag-y", `${drag.y.toFixed(2)}px`);
      root.style.setProperty("--scroll-shift", `${scroll.shift.toFixed(2)}px`);
      root.style.setProperty("--space-warp", scroll.warp.toFixed(3));
      root.style.setProperty("--flash", flash.toFixed(3));
    }

    function seedParticles() {
      const count = window.innerWidth < 720 ? 52 : 88;
      const clusterCount = window.innerWidth < 720 ? 4 : 6;
      const anchors = Array.from({ length: clusterCount }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight
      }));
      particles.length = 0;

      for (let index = 0; index < count; index += 1) {
        const anchor = anchors[index % anchors.length];
        const clustered = Math.random() < 0.78;
        const spread = window.innerWidth < 720 ? 84 : 128;
        const x = clustered
          ? clamp(anchor.x + (Math.random() - 0.5) * spread * 2.1, 0, window.innerWidth)
          : Math.random() * window.innerWidth;
        const y = clustered
          ? clamp(anchor.y + (Math.random() - 0.5) * spread * 1.8, 0, window.innerHeight)
          : Math.random() * window.innerHeight;
        const hub = Math.random() < 0.2;

        particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          size: Math.floor(Math.random() * 2) + 1 + (hub ? 1 : 0),
          hub,
          glow: 0.46 + Math.random() * 0.36,
          linkRadius: (hub ? 220 : 150) + Math.random() * 36,
          twinkleRate: 0.0012 + Math.random() * 0.0028,
          twinkleOffset: Math.random() * Math.PI * 2,
          twinkleDepth: hub ? 0.22 + Math.random() * 0.12 : 0.34 + Math.random() * 0.32
        });
      }
    }

    function resizeCanvas() {
      const ratio = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(window.innerWidth * ratio);
      canvas.height = Math.floor(window.innerHeight * ratio);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.imageSmoothingEnabled = false;
      seedParticles();
      pointer.x = window.innerWidth / 2;
      pointer.y = window.innerHeight / 2;
      pointer.targetX = pointer.x;
      pointer.targetY = pointer.y;
      drag.x = 0;
      drag.y = 0;
      drag.lastX = pointer.x;
      drag.lastY = pointer.y;
      scroll.shift = 0;
      scroll.velocity = 0;
      scroll.warp = 0;
      scroll.direction = 1;
      setScene(pointer.x, pointer.y);
    }

    function cyclePhase() {
      phaseIndex = (phaseIndex + 1) % phaseStates.length;
      root.style.setProperty("--phase-rotate", `${phaseStates[phaseIndex].rotate}deg`);
      root.style.setProperty("--glow-size", phaseStates[phaseIndex].glow);
    }

    function createRipple(x, y) {
      const ripple = document.createElement("span");
      ripple.className = "ripple";
      ripple.style.left = `${x}px`;
      ripple.style.top = `${y}px`;
      interactionLayer.appendChild(ripple);
      ripple.addEventListener("animationend", () => ripple.remove(), { once: true });
    }

    function createGlyph(x, y, index) {
      const glyph = document.createElement("span");
      const angle = (Math.PI * 2 * index) / 12 + Math.random() * 0.3;
      const distance = 34 + Math.random() * 90;
      const dx = Math.cos(angle) * distance;
      const dy = Math.sin(angle) * distance;

      glyph.className = "glyph";
      glyph.textContent = glyphPool[(phaseIndex * 5 + index) % glyphPool.length];
      glyph.style.left = `${x}px`;
      glyph.style.top = `${y}px`;
      glyph.style.setProperty("--dx", `${dx}px`);
      glyph.style.setProperty("--dy", `${dy}px`);
      glyph.style.setProperty("--rotate", `${(angle * 180) / Math.PI}deg`);
      interactionLayer.appendChild(glyph);
      glyph.addEventListener("animationend", () => glyph.remove(), { once: true });
    }

    function createPixel(x, y, index) {
      const pixel = document.createElement("span");
      const angle = (Math.PI * 2 * index) / 10 + Math.random() * 0.35;
      const distance = 24 + Math.random() * 68;
      const dx = Math.cos(angle) * distance;
      const dy = Math.sin(angle) * distance;

      pixel.className = "pixel";
      pixel.style.left = `${x}px`;
      pixel.style.top = `${y}px`;
      pixel.style.setProperty("--dx", `${dx}px`);
      pixel.style.setProperty("--dy", `${dy}px`);
      pixel.style.setProperty("--size", `${6 + Math.floor(Math.random() * 5)}px`);
      interactionLayer.appendChild(pixel);
      pixel.addEventListener("animationend", () => pixel.remove(), { once: true });
    }

    function scatterParticles(x, y, power = 2.6) {
      particles.forEach((particle) => {
        const dx = particle.x - x;
        const dy = particle.y - y;
        const distance = Math.hypot(dx, dy) || 1;
        const force = Math.max(0, 210 - distance) / 210;

        particle.vx += (dx / distance) * force * power;
        particle.vy += (dy / distance) * force * power;
      });
    }

    function createBurst(x, y, glyphCount = 12, pixelCount = 10) {
      for (let index = 0; index < glyphCount; index += 1) {
        createGlyph(x, y, Math.floor(Math.random() * 12));
      }

      for (let index = 0; index < pixelCount; index += 1) {
        createPixel(x, y, Math.floor(Math.random() * 10));
      }
    }

    function stopAmbientShuffle(resetText = true) {
      clearInterval(ambientShuffleInterval);
      ambientShuffleInterval = 0;

      if (resetText) {
        headline.textContent = headlineText;
      }
    }

    function scheduleAmbientShuffle() {
      if (reduceMotion) {
        return;
      }

      clearInterval(ambientShuffleInterval);
      ambientShuffleInterval = window.setInterval(() => {
        if (headline.dataset.state === "scrambling") {
          headline.textContent = headlineText;
          return;
        }

        const shuffledIndices = ambientShuffleIndices
          .filter(() => Math.random() <= ambientShuffleChance)
          .slice(0, ambientShuffleMaxCharacters);

        headline.textContent = headlineCharacters
          .map((character, index) => {
            if (character === " " || !shuffledIndices.includes(index)) {
              return character;
            }

            return scramblePool[Math.floor(Math.random() * scramblePool.length)];
          })
          .join("");
      }, ambientShuffleTickDelay);
    }

    function scrambleHeadline() {
      if (reduceMotion) {
        return;
      }

      stopAmbientShuffle(false);
      cancelAnimationFrame(scrambleFrame);
      headline.dataset.state = "scrambling";
      let frame = 0;

      function step() {
        frame += 1;
        const reveal = frame / scrambleDuration;

        headline.textContent = headlineText
          .split("")
          .map((character, index) => {
            if (character === " ") {
              return " ";
            }

            if (index / headlineText.length < reveal) {
              return headlineText[index];
            }

            return scramblePool[(index * 7 + frame) % scramblePool.length];
          })
          .join("");

        if (frame < scrambleDuration) {
          scrambleFrame = requestAnimationFrame(step);
        } else {
          headline.textContent = headlineText;
          headline.dataset.state = "";
          scheduleAmbientShuffle();
        }
      }

      step();
    }

    function disturb(x, y) {
      flash = Math.max(flash, 1.15);
      cyclePhase();
      createRipple(x, y);
      scrambleHeadline();
      createBurst(x, y);
      scatterParticles(x, y);
    }

    function dragScene(x, y, deltaX, deltaY) {
      drag.x = clamp(drag.x + deltaX * 1.15, -160, 160);
      drag.y = clamp(drag.y + deltaY * 1.15, -120, 120);
      flash = Math.max(flash, 0.48);
      scatterParticles(x, y, 1.4);

      if (reduceMotion) {
        return;
      }

      const now = performance.now();
      if (now - drag.lastBurst < 48) {
        return;
      }

      drag.lastBurst = now;

      for (let index = 0; index < 3; index += 1) {
        createGlyph(x, y, Math.floor(Math.random() * 12));
      }

      for (let index = 0; index < 4; index += 1) {
        createPixel(x, y, Math.floor(Math.random() * 10));
      }
    }

    function scrollScene(deltaY) {
      const delta = clamp(deltaY, -120, 120);
      const focusX = pointer.targetX || window.innerWidth / 2;
      const focusY = pointer.targetY || window.innerHeight / 2;

      scroll.shift = clamp(scroll.shift + delta * 0.72, -180, 180);
      scroll.velocity = clamp(scroll.velocity + delta * 0.016, -2.8, 2.8);
      scroll.warp = clamp(scroll.warp + Math.abs(delta) * 0.018, 0, 3.8);
      scroll.direction = delta >= 0 ? 1 : -1;
      flash = Math.max(flash, 0.62);

      if (Math.abs(delta) > 42) {
        cyclePhase();
        createRipple(focusX, focusY);
        createBurst(focusX, focusY, 4, 6);
      }

      scatterParticles(focusX, focusY, 1.9);
    }

    function drawField() {
      const now = performance.now();
      const travelFocusX = window.innerWidth / 2 + drag.x * 0.18;
      const travelFocusY = window.innerHeight / 2 + scroll.shift * 0.18;
      const travelStrength = scroll.warp;
      const maxDistance = Math.max(window.innerWidth, window.innerHeight);
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      const glow = ctx.createRadialGradient(pointer.x, pointer.y, 0, pointer.x, pointer.y, 250);
      glow.addColorStop(0, `rgba(109, 174, 230, ${0.14 + flash * 0.08})`);
      glow.addColorStop(1, "rgba(109, 174, 230, 0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      for (let left = 0; left < particles.length; left += 1) {
        const particle = particles[left];
        const prevX = particle.x;
        const prevY = particle.y;
        let respawned = false;
        const dx = pointer.x - particle.x;
        const dy = pointer.y - particle.y;
        const distance = Math.hypot(dx, dy) || 1;
        const radialX = particle.x - travelFocusX;
        const radialY = particle.y - travelFocusY;
        const radialDistance = Math.hypot(radialX, radialY) || 1;

        if (distance < 220) {
          const force = (1 - distance / 220) * (pointer.active ? -0.08 : -0.03);
          particle.vx += (dx / distance) * force;
          particle.vy += (dy / distance) * force;
        }

        if (travelStrength > 0.04) {
          const radialUnitX = radialX / radialDistance;
          const radialUnitY = radialY / radialDistance;
          const travelForce = scroll.direction > 0
            ? (0.016 + (radialDistance / maxDistance) * 0.05) * travelStrength
            : -(0.012 + (1 - Math.min(1, radialDistance / maxDistance)) * 0.06) * travelStrength;

          particle.vx += radialUnitX * travelForce;
          particle.vy += radialUnitY * travelForce;
        }

        particle.vx += (Math.random() - 0.5) * 0.012;
        particle.vy += (Math.random() - 0.5) * 0.012;
        particle.vx *= 0.986;
        particle.vy *= 0.986;
        particle.x += particle.vx + drag.x * 0.0024;
        particle.y += particle.vy + scroll.velocity + drag.y * 0.0018;

        if (scroll.direction < 0 && travelStrength > 0.3 && radialDistance < 16) {
          const angle = Math.random() * Math.PI * 2;
          const spawnRadius = maxDistance * (0.42 + Math.random() * 0.24);
          particle.x = travelFocusX + Math.cos(angle) * spawnRadius;
          particle.y = travelFocusY + Math.sin(angle) * spawnRadius;
          particle.vx = Math.cos(angle) * -0.4;
          particle.vy = Math.sin(angle) * -0.4;
          respawned = true;
        } else if (
          particle.x < -40 || particle.x > window.innerWidth + 40 ||
          particle.y < -40 || particle.y > window.innerHeight + 40
        ) {
          if (travelStrength > 0.28 && scroll.direction > 0) {
            const angle = Math.random() * Math.PI * 2;
            const spawnRadius = 10 + Math.random() * 72;
            particle.x = travelFocusX + Math.cos(angle) * spawnRadius;
            particle.y = travelFocusY + Math.sin(angle) * spawnRadius;
            particle.vx = Math.cos(angle) * (0.2 + Math.random() * 0.5);
            particle.vy = Math.sin(angle) * (0.2 + Math.random() * 0.5);
            respawned = true;
          } else {
            if (particle.x < -40 || particle.x > window.innerWidth + 40) {
              particle.vx *= -1;
            }

            if (particle.y < -40 || particle.y > window.innerHeight + 40) {
              particle.vy *= -1;
            }
          }
        }

        particle.prevX = respawned ? particle.x : prevX;
        particle.prevY = respawned ? particle.y : prevY;

        for (let right = left + 1; right < particles.length; right += 1) {
          const other = particles[right];
          const linkX = other.x - particle.x;
          const linkY = other.y - particle.y;
          const linkDistance = Math.hypot(linkX, linkY);
          const linkLimit = Math.min(particle.linkRadius, other.linkRadius);

          if (linkDistance < linkLimit) {
            const x1 = Math.round(particle.x);
            const y1 = Math.round(particle.y);
            const x2 = Math.round(other.x);
            const y2 = Math.round(other.y);
            const opacityBoost = particle.hub || other.hub ? 0.09 : 0;
            const twinkleMix = (
              (0.55 + 0.45 * ((Math.sin(now * particle.twinkleRate + particle.twinkleOffset) + 1) * 0.5)) +
              (0.55 + 0.45 * ((Math.sin(now * other.twinkleRate + other.twinkleOffset) + 1) * 0.5))
            ) / 2;

            ctx.fillStyle = `rgba(109, 174, 230, ${((1 - linkDistance / linkLimit) * 0.18 + flash * 0.03 + opacityBoost) * twinkleMix})`;
            ctx.fillRect(Math.min(x1, x2), y1, Math.abs(x2 - x1) + 1, 1);
            ctx.fillRect(x2, Math.min(y1, y2), 1, Math.abs(y2 - y1) + 1);

            if (particle.hub || other.hub) {
              ctx.fillStyle = `rgba(237, 246, 255, ${0.22 + flash * 0.04})`;
              ctx.fillRect(x2 - 1, y1 - 1, 3, 3);
            }
          }
        }
      }

      particles.forEach((particle) => {
        const x = Math.round(particle.x);
        const y = Math.round(particle.y);
        const size = particle.size;
        const motionX = particle.x - particle.prevX;
        const motionY = particle.y - particle.prevY;
        const motionDistance = Math.hypot(motionX, motionY);
        const twinkleWave = (Math.sin(now * particle.twinkleRate + particle.twinkleOffset) + 1) * 0.5;
        const twinkleGlow = clamp(
          particle.glow * ((1 - particle.twinkleDepth) + particle.twinkleDepth * twinkleWave) + flash * 0.18,
          0.16,
          1
        );

        if (travelStrength > 0.12 && motionDistance > 0.18) {
          const trailLength = Math.min(18, (travelStrength * 4.8) + motionDistance * 7);
          ctx.strokeStyle = `rgba(237, 246, 255, ${twinkleGlow * 0.52})`;
          ctx.lineWidth = particle.hub ? 2 : 1;
          ctx.lineCap = "square";
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x - motionX * trailLength, y - motionY * trailLength);
          ctx.stroke();
        }

        ctx.fillStyle = `rgba(237, 246, 255, ${twinkleGlow})`;
        ctx.fillRect(x, y, size, size);

        if (size > 1) {
          ctx.fillRect(x - 2, y + 1, 1, 1);
          ctx.fillRect(x + size + 1, y + 1, 1, 1);
        }

        if (particle.hub) {
          ctx.fillStyle = `rgba(109, 174, 230, ${0.28 + flash * 0.08})`;
          ctx.fillRect(x - 1, y - 1, size + 2, size + 2);
          ctx.fillRect(x - 4, y + 1, 2, 1);
          ctx.fillRect(x + size + 2, y + 1, 2, 1);
          ctx.fillRect(x + 1, y - 4, 1, 2);
          ctx.fillRect(x + 1, y + size + 2, 1, 2);
        }
      });
    }

    function animate() {
      pointer.x += (pointer.targetX - pointer.x) * 0.12;
      pointer.y += (pointer.targetY - pointer.y) * 0.12;
      if (!drag.active) {
        drag.x *= 0.88;
        drag.y *= 0.88;
      }
      scroll.shift *= 0.9;
      scroll.velocity *= 0.9;
      scroll.warp += (0 - scroll.warp) * 0.09;
      flash += (0 - flash) * 0.08;
      setScene(pointer.x, pointer.y);
      drawField();
      requestAnimationFrame(animate);
    }

    window.addEventListener("pointermove", (event) => {
      pointer.active = true;
      pointer.targetX = event.clientX;
      pointer.targetY = event.clientY;

      if (drag.active) {
        const deltaX = event.clientX - drag.lastX;
        const deltaY = event.clientY - drag.lastY;
        drag.lastX = event.clientX;
        drag.lastY = event.clientY;
        dragScene(event.clientX, event.clientY, deltaX, deltaY);
      }
    });

    window.addEventListener("pointerdown", (event) => {
      drag.active = true;
      drag.lastX = event.clientX;
      drag.lastY = event.clientY;
      body.classList.add("dragging");
      disturb(event.clientX, event.clientY);
    });

    function stopDrag() {
      drag.active = false;
      body.classList.remove("dragging");
    }

    window.addEventListener("pointerup", stopDrag);
    window.addEventListener("pointercancel", stopDrag);

    document.addEventListener("mouseleave", () => {
      pointer.active = false;
      pointer.targetX = window.innerWidth / 2;
      pointer.targetY = window.innerHeight / 2;
      stopDrag();
    });

    window.addEventListener("resize", resizeCanvas);

    window.addEventListener("wheel", (event) => {
      event.preventDefault();
      scrollScene(event.deltaY);
    }, { passive: false });

    window.addEventListener("keydown", (event) => {
      if (event.code === "Space" || event.code === "Enter") {
        disturb(pointer.x, pointer.y);
      }
    });

    resizeCanvas();

    if (!reduceMotion) {
      scheduleAmbientShuffle();
      animate();
    }
  </script>
</body>
</html>
